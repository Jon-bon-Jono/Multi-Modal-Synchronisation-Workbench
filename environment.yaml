name: syncwb
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip>=23

  # Core runtime dependencies
  - numpy>=1.23
  - pandas>=1.5
  - pyyaml>=6.0
  - pyarrow>=14
  - zstandard>=0.22
  - tabulate>=0.9

  # Development / testing
  - pytest>=7

  # Notebook support
  - jupyterlab
  - notebook
  - ipykernel
  - ipywidgets
  - pip:
      - -e .
